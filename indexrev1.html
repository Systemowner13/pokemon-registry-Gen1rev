<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pokemon Registry</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b0f14">
<link rel="manifest" href="manifest.json">

<style>
:root {
  --bg:#0b0f14;
  --card:#121821;
  --border:#1f2a36;
  --accent:#4cc9f0;
  --text:#e6edf3;
}

body {
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

/* NAVBAR */
.navbar {
  position:sticky;
  top:0;
  background:rgba(11,15,20,0.95);
  padding:15px 20px;
  border-bottom:1px solid var(--border);
  z-index:100;
}

.title { font-size:18px; font-weight:600; }
.stats { font-size:13px; opacity:.7; margin-top:4px; }

.progress-container {
  height:6px;
  background:#1a222c;
  border-radius:10px;
  margin-top:8px;
  overflow:hidden;
}

.progress-bar {
  height:100%;
  background:var(--accent);
  width:0%;
}

/* INSTALL BUTTON */
#installBtn {
  margin-top:10px;
  padding:8px 12px;
  background:var(--accent);
  border:none;
  border-radius:6px;
  cursor:pointer;
  display:none;
}

/* SEARCH */
#search {
  width:calc(100% - 40px);
  margin:10px 20px;
  padding:10px;
  border-radius:8px;
  border:none;
  background:#121821;
  color:white;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:12px;
  padding:20px;
}

.slot {
  background:linear-gradient(145deg,#121821,#0d131a);
  border:1px solid var(--border);
  border-radius:12px;
  height:180px;
  position:relative;
  cursor:pointer;
  transition:.2s;
}

.slot:hover {
  transform:translateY(-3px);
  border-color:var(--accent);
}

.slot img {
  width:100%;
  height:100%;
  object-fit:contain;
}

.slot-name {
  position:absolute;
  bottom:5px;
  left:8px;
  font-size:11px;
  opacity:.75;
}

/* MODAL */
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.92);
  display:none;
  flex-direction:column;
}

.modal-header {
  padding:10px 20px;
  border-bottom:1px solid var(--border);
}

.modal-content {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:10px;
  padding:15px;
  overflow-y:auto;
}

.card img { width:100%; cursor:pointer; }
</style>

</head>

<body>

<div class="navbar">
  <div class="title">Gen 1 Pokémon Registry</div>
  <div class="stats" id="stats"></div>

  <div class="progress-container">
    <div class="progress-bar" id="progress"></div>
  </div>

<button id="installBtn">Install App</button>

</div>

<input id="search" placeholder="Search Pokémon...">

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
  <div class="modal-header">
    <button onclick="closeModal()">Close</button>
    <span id="modalTitle"></span>
  </div>
  <div class="modal-content" id="modalContent"></div>
</div>

<script>
// --- POKEMON LIST (trimmed example; keep your full 151 here) ---
const pokemon = [
"Bulbasaur","Ivysaur","Venusaur","Charmander","Charmeleon","Charizard",
"Squirtle","Wartortle","Blastoise","Pikachu","Raichu","Mewtwo","Mew"
];

// --- STATE ---
const grid = document.getElementById("grid");
const saved = JSON.parse(localStorage.getItem("collection") || "{}");

// --- STATS ---
function updateStats(){
  const count = Object.keys(saved).length;
  const percent = Math.round((count / pokemon.length)*100);
  stats.innerText = `${count}/${pokemon.length} Collected • ${percent}%`;
  progress.style.width = percent + "%";
}

// --- GRID ---
function renderGrid(filter=""){
  grid.innerHTML="";

  pokemon.forEach((name,index)=>{
    if(!name.toLowerCase().includes(filter.toLowerCase())) return;

    const div=document.createElement("div");
    div.className="slot";

    if(saved[index]){
      const img=document.createElement("img");
      img.src=saved[index];
      div.appendChild(img);
    }

    const label=document.createElement("div");
    label.className="slot-name";
    label.textContent=`${index+1}. ${name}`;

    div.appendChild(label);
    div.onclick=()=>openModal(name,index);

    grid.appendChild(div);
  });
}

// --- SEARCH ---
search.addEventListener("input",e=>{
  renderGrid(e.target.value);
});

// --- MODAL ---
let selectedIndex=null;

function openModal(name,index){
  modal.style.display="flex";
  modalContent.innerHTML="";
  modalTitle.textContent=name;
  selectedIndex=index;

  fetch(`https://api.pokemontcg.io/v2/cards?q=name:${name}`)
  .then(res=>res.json())
  .then(data=>{
    data.data.forEach(card=>{
      const div=document.createElement("div");
      div.className="card";

      const img=document.createElement("img");
      img.src=card.images.small;

      div.onclick=()=>selectCard(card.images.small);

      div.appendChild(img);
      modalContent.appendChild(div);
    });
  });
}

function selectCard(url){
  saved[selectedIndex]=url;
  localStorage.setItem("collection",JSON.stringify(saved));
  location.reload();
}

function closeModal(){
  modal.style.display="none";
}

// --- INSTALL BUTTON ---
let deferredPrompt;
window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault();
  deferredPrompt=e;
  installBtn.style.display="block";
});

installBtn.onclick=async ()=>{
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  installBtn.style.display="none";
};

// --- SERVICE WORKER ---
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("service-worker.js");
}

// --- INIT ---
updateStats();
renderGrid();
</script>

</body>
</html>
